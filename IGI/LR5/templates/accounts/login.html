{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-header bg-dark text-white"><h5 class="mb-0"><i class="bi bi-box-arrow-in-right"></i> Вход</h5></div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-dark w-100 mt-2">Войти</button>
        </form>
        <hr>
        <p class="text-center mb-0">Нет аккаунта? <a href="{% url 'accounts:register' %}">Зарегистрироваться</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
