{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Профиль покупателя{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-7">
    <div class="card shadow-sm">
      <div class="card-header"><h5 class="mb-0"><i class="bi bi-person-gear"></i> Профиль покупателя</h5></div>
      <div class="card-body">
        <form method="post" novalidate>
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">Сохранить</button>
            <a href="{% url 'shop:cabinet' %}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
