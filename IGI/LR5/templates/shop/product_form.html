{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ action }} товар — BookStore{% endblock %}
{% block content %}
<h1>{{ action }} товар</h1>
<div class="row">
  <div class="col-md-8">
    <div class="card shadow-sm">
      <div class="card-body">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">{{ action }}</button>
            <a href="{% url 'shop:catalogue' %}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
